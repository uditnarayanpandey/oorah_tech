<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/oorah-favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="OORAH - Innovative Product Solutions" />
    <title>OORAH Tech</title>
    <script>
      // GitHub Pages SPA redirect — restore path from 404.html redirect
      (function() {
        var p = window.location.search.slice(1).match(/p=\/([^&]*)/);
        if (p) {
          window.history.replaceState(null, null,
            '/' + window.location.pathname.split('/').slice(0, 2).join('/') + '/' +
            p[1].replace(/~and~/g, '&') +
            (window.location.search.slice(1).match(/q=([^&]*)/) ? '?' + window.location.search.slice(1).match(/q=([^&]*)/)[1].replace(/~and~/g, '&') : '') +
            window.location.hash
          );
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
